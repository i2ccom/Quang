<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rays of light -->
  <polygon points="120,100 40,0 100,10" fill="url(#ray)" opacity="0.3"/>
  <polygon points="120,100 30,50 90,30" fill="url(#ray)" opacity="0.5"/>
  <polygon points="120,100 10,100 70,80" fill="url(#ray)" opacity="0.3"/>
  <polygon points="120,100 30,150 90,170" fill="url(#ray)" opacity="0.5"/>
  <polygon points="120,100 40,200 100,190" fill="url(#ray)" opacity="0.3"/>

  <!-- Light source / diamond -->
  <circle cx="120" cy="100" r="24" fill="url(#g)" opacity="0.15"/>
  <polygon points="120,60 150,100 120,140 90,100" fill="url(#g)" stroke="#f59e0b" stroke-width="2"/>

  <!-- QUANG text -->
  <text x="190" y="120" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="64" letter-spacing="8" fill="#f8fafc">
    QUANG
  </text>

  <!-- Subtitle -->
  <text x="195" y="155" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" letter-spacing="4" fill="#94a3b8">
    AI-FIRST · AGENT-NATIVE WEB FRAMEWORK
  </text>
</svg>
